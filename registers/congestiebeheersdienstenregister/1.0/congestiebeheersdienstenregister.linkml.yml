slots:
  EAN-code:
    description: unieke cijfercombinatie volgens de Europese Artikelnummer-standaard
    required: true
    range: Code
  beginmoment:
    description: eerste moment waarop iets geldt
    range: Tijdstip
    required: true
  eindmoment:
    description: eerste moment waarop iets niet meer geldt
    range: Tijdstip
    required: true
  begin levering:
    description: TODO
    required: true
    range: Tijdstip
  einde levering:
    description: TODO
    required: true
    range: Tijdstip
  richting:
    description: TODO
    required: true
    range: Sturingsrichting
  volume:
    description: TODO (het gaat hier niet om een gemeten maar een toegezegd volume, vandaar als decimaal getal)
    range: Decimaal getal
    unit:
      ucum_code: MWh

enums:
  Sturingsrichting:
    permissible_values:
      opregelen:
        description: meer invoeden of minder afnemen
      afregelen:
        description: minder invoeden of meer afnemen
  Energierichting:
    permissible_values:
      afname:
        meaning: begrip:3j33z #afname
      invoeding:
        meaning: begrip:j8cpp #invoeding
  Vorm:
    permissible_values:
      vast:
      variabel:
  Wijze:
    permissible_values:
      API:
        description: via een webservice (voor systemen)
      GUI:
        description: via een gebruikersinterface (voor mensen)
