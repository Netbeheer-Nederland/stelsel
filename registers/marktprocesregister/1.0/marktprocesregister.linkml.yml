id: https://modellen.netbeheernederland.nl/stelsel/registers/marktprocesregister
name: marktprocesregister
title: Marktprocesregister
version: "1.0-draft"
description: Het marktprocesregister bevat informatie over processen die kunnen leiden tot mutaties in de energiemarkt en waarvan het verloop inzichtelijk moet zijn voor marktpartijen.
see_also:
  - iceg:g=2025-01-01
prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/marktprocesregister#
  aansluitingenregister: https://modellen.netbeheernederland.nl/stelsel/registers/aansluitingenregister#
  marktpartijenregister: https://modellen.netbeheernederland.nl/stelsel/registers/marktpartijenregister#
  iceg: https://wetten.overheid.nl/jci1.3:c:BWBR0037934&
default_prefix: this
imports:
  - ../../basiswaardesoorten

classes:
  Marktproces:
    class_uri: Marktproces
    broad_mappings: begrip:ihyma #marktactiviteit
    description: samenhangende set activiteiten voor een mutatie op een object in de energiemarkt
    slots:
      - identificatie
    attributes:
      initiator:
        description: partij die verantwoordelijk is voor de initiatie van het proces
        required: true
      soort:
        description: typering van het marktproces volgens gestandaardiseerde categorieën
        comments:
          - "Gelijk aan de soort van het eerste deelproces."
        range: Code
        required: true
      status:
        description: toestand van het proces in de levenscyclus van initiatie tot afronding
        comments:
          - "Afgeleid uit de status van de onderliggende processtappen."
        range: Processtatus
        required: true
      # relaties:
      op:
        range: Any
        exactly_one_of:
          - range: Aansluiting
          - range: Allocatiepunt
          - range: Netkoppeling
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Deelproces:
    class_uri: Deelproces
    broad_mappings: begrip:ihyma #marktactiviteit
    description: samenhangende verzameling processtappen binnen een marktproces met een gemeenschappelijk doel
    slots:
      - identificatie
    attributes:
      soort:
        description: typering van het deelproces volgens gestandaardiseerde procesonderdelen
        comments:
          - Er zijn ongeveer 50 soorten, waaronder `ADMSTAT`, `ALLMTCHG` en `BBBAGUPD`.
        range: Code
        required: true
      effectueringsdatum:
        description: datum waarop de beoogde wijziging van kracht wordt
        range: Datum
        required: true
      registratiemoment:
        description: tijdstip waarop het deelproces is vastgelegd in het register
        range: Tijdstip
        required: true
      # relaties:
      deel van:
        range: Marktproces
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "1..*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Processtap:
    class_uri: Bericht
    broad_mappings: begrip:ihyma #marktactiviteit
    description: afgebakend deel van een marktproces dat door één marktpartij wordt uitgevoerd
    attributes:
      stapnummer:
        description: volgnummer dat de processtap binnen het deelproces representeert
        range: Code
        required: true
      soort:
        description: typering van de processtap volgens gestandaardiseerde berichtcategorieën
        range: Stapsoort
        required: true
      status:
        description: toestand in de levenscyclus van de processtap
        comments:
          - Afgeleid uit `soort`, `geannuleerd`, `ophaalmoment`, `effectueringsdatum` en `gericht op`.
        range: Stapstatus
        required: true
      geannuleerd:
        description: aanduiding of de processtap niet verder wordt uitgevoerd
        range: Waarheidswaarde
        required: true
      beginmoment:
        description: tijdstip waarop de processtap is is begonnen
        range: Tijdstip
        required: true
      berichtidentificatie:
        description: unieke identificatie van het bericht in uitwisselingssystemen
        range: Code
      ophaalmoment:
        description: tijdstip waarop een bericht is opgehaald door de ontvanger
        range: Tijdstip
      berichtinhoud:
        description: inhoud van het bericht in het afgesproken uitwisselingsformaat
      referentie:
        description: identificatie die door de verzendende partij aan het bericht is toegekend
        range: Code
      # relaties:
      deel van:
        range: Deelproces
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "1..*"
      door:
        description: partij die de processtap heeft geïnitieerd
        range: Marktpartijsubregistratie
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      gericht op:
        description: partij op wie de processtap is gericht en die een bericht op kan halen met informatie over die stap
        range: Marktpartijsubregistratie
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - stapnummer
          - deel van

  # verwijzingen naar externe entiteiten:
  Aansluiting:
    class_uri: aansluitingenregister:Aansluiting
    annotations:
      external_registry: Aansluitingenregister
  Allocatiepunt:
    class_uri: aansluitingenregister:Allocatiepunt
    annotations:
      external_registry: Aansluitingenregister
  Netkoppeling:
    class_uri: aansluitingenregister:Netkoppeling
    annotations:
      external_registry: Aansluitingenregister
  Marktpartijsubregistratie:
    class_uri: marktpartijenregister:Marktpartijsubregistratie
    annotations:
      external_registry: Marktpartijenregister

slots:
  identificatie:
    description: unieke aanduiding waarmee iets binnen een gegeven context ondubbelzinnig herkenbaar is
    range: Code
    required: true

enums:
  Stapsoort:
    permissible_values:
      REQUEST:
      CONFIRM:
      REJECT:
      UPDATE:
      CONNDATA:
      GAIN:
      LOSS:
      MSTRDATA:
      MSTDGAIN:
      CDMPDATA:
      SYSTEM:
        description: overig
  Processtatus:
    permissible_values:
      PEN:
        description: toekomstige effectuering
      RDY:
        description: geëffectueerd maar niet beëindigd
      CLD:
        description: beëindigd
      CAN:
        description: geannuleerd
  Stapstatus:
    permissible_values:
      AVL:
        description: bericht beschikbaar
      SCH:
        description: bericht gepland
      RTV:
        description: bericht opgehaald
      RCV:
        description: bericht ontvangen
      CAN:
        description: geannuleerd
      NA:
        description: geen bericht
