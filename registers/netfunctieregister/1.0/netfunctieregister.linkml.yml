id: https://modellen.netbeheernederland.nl/stelsel/registers/netfunctieregister
name: netfunctieregister
title: Netfunctieregister
version: 1.0-draft
description: Het netfunctieregister legt de transportcapaciteiten van energienetten vast op drie samenhangende abstractieniveaus (netelementen, padsegmenten en transporteenheden). Hierdoor worden keuzes over congestie, wachtrijen en uitbreidingen reproduceerbaar en uitlegbaar.
comments: |
  Het netfunctieregister beschrijft wat het net volgens ontwerp moet kunnen, niet hoe het net op enig moment staat geschakeld.

  De transportcapaciteit van een transporteenheid wordt bepaald door zowel de beschikbare padsegmenten als door netelementen die door meerdere paden worden gedeeld, zoals railsystemen en driewegstransformatoren. Door deze samenhang expliciet te modelleren, wordt de bepaling van transportcapaciteit stabiel, herleidbaar en toepasbaar in congestiebeheer.

  Over het algemeen geldt:

  * `beschikbaar` = `aanwezig` - `benodigd`
  * `benodigd` + `gevraagd` > `aanwezig`: capaciteitsknelpunt
  * `benodigd` + `gevraagd` > `aanwezig` + `regelbaar`: congestiegebied

prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/netfunctieregister#
  bce: https://wetten.overheid.nl/jci1.3:c:BWBR0052320&
default_prefix: this
imports:
  - ../../basiswaardesoorten
default_range: Tekst

classes:
  Transporteenheid:
    class_uri: Transporteenheid
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: deel van het energienet dat in samenhang moet worden beschouwd om de aanwezige transportcapaciteit te kunnen bepalen
    comments:
      - Een transporteenheid wordt ontworpen met een normatieve ontwerprichtting. Dat is de richting waarin het energienet is ontworpen om energie betrouwbaar te leveren. Deze richting wordt soms aangeduid als 'afname', maar die term werkt verwarrend omdat er bijvoorbeeld aansluitingen bestaan die zijn ontworpen om in te voeden, zoals bij energieproducenten.
      - Een transporteenheid kan één padsegment bevatten (radiaal) of meerdere (standby, gesectioneerd, parallel).
      - Een transporteenheid is het niveau waarop netbeheerders de transportcapaciteiten bepalen (aanwezig, benodigd, beschikbaar), capaciteitsknelpunten signaleren, congestiegebieden afroepen en wachtrijen beheren.
    slots:
      - identificatie
    attributes:
      richting:
        description: geeft aan of de transporteenheid wordt beschouwd in de normatieve ontwerprichting dan wel in de tegengestelde richting daarvan
        range: Richting
        required: true
      netvlak:
        description: netvlak waarvoor deze transporteenheid de transportfunctie vervult
        range: Netvlak
        required: true
      redundatieniveau:
        description: aantal padsegmenten dat onbeschikbaar kan zijn zonder (lange) onderbreking van het energietransport
        range: Geheel getal
        required: true
      individuele aanwezige transportcapaciteit:
        broad_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        description: aanwezige transportcapaciteit van een afzonderlijke transporteenheid, zonder rekening te houden met gelijktijdige belasting door andere transporteenheden
        comments:
          - "Afleidingsregel: de kleinste waarde, over alle relevante scenario's, van de meest beperkende factor tussen de padsegmenten en de gedeelde netelementen in dat scenario."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MW
      regelbare transportcapaciteit:
        description: transportcapaciteit die door toepassing van regelmiddelen kan worden benut om overschrijding van de aanwezige transportcapaciteit te voorkomen
        source: bce:g=2026-02-21
        comments:
          - Regelmiddelen zijn onder andere het gecontroleerd afschakelen van zuivere invoeding, capaciteitssturing (inclusief statische capaciteitsbeperking) en redispatchbiedingen. Alternatieve transportrechten gelden niet als regelmiddel maar bepalen de benodigde transportcapaciteit.
        required: true
        range: Reëel getal
        unit:
          ucum_code: MW
      benodigde transportcapaciteit:
        exact_mappings:
          - begrip:7bs28 #benodigde transportcapaciteit
        comments:
          - De bendodigde transportcapaciteit wordt bepaald door de alternatieve en volledig vaste rechten op transport. Congestiebeheersdiensten verlagen de benodigde transportcapaciteit niet.
        range: Reëel getal
        unit:
          ucum_code: MW      
      individuele beschikbare transportcapaciteit:
        description: deel van de individuele aanwezige transportcapaciteit dat niet wordt ingezet om aan de benodigde transportcapaciteit te voldoen
        source: bce:g=2026-02-21
        range: Reëel getal
        unit:
          ucum_code: MW
      gevraagde transportcapaciteit:
        exact_mappings:
          - begrip:7n44w #gevraagde transportcapaciteit
        range: Reëel getal
        unit:
          ucum_code: MW
      # relaties:
      samengesteld uit:
        range: Padsegment
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      volgend op:
        description: B is volgend op A indien energietransport richting B verloopt via A.
        range: Transporteenheid
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Capaciteitsdeling tussen padsegmenten:
    class_uri: Capaciteitsdeling-tussen-padsegmenten
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen padsegmenten waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netstructuur
    attributes:
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - "Afleidingsregel: gelijk aan de kleinste normale capaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        comments:
          - "Afleidingsregel: gelijk aan de kleinste noodcapaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      tussen:
        range: Padsegment
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Capaciteitsdeling tussen transporteenheden:
    class_uri: Capaciteitsdeling-tussen-transporteenheden
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen transporteenheden waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netstructuur
    attributes:
      aanwezige transportcapaciteit:
        exact_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        range: Reëel getal
        required: true
        unit:
          ucum_code: MW
      beschikbare transportcapaciteit:
        description: deel van de aanwezige transportcapaciteit dat niet wordt ingezet om aan de benodigde transportcapaciteit te voldoen
        source: bce:g=2026-02-21
        comments:
          - "Validatieregel: gelijk aan hetverschil tussen de aanwezige transportcapaciteit en de som van de benodigde transportcapaciteiten van de betrokken transporteenheden."
        range: Reëel getal
        unit:
          ucum_code: MW
      # relaties:
      tussen:
        range: Transporteenheid
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Padsegment:
    class_uri: Padsegment
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: afzonderlijk relevante transportroute voor capaciteits- en faalscenario-analyse
    comments:
      - Een transportroute waarin netelementen parallel staan opgesteld maar niet onafhankelijk kunnen falen, kan worden beschouwd als één padsegment. Hieronder vallen parallelle kabels tussen stations zonder schakelmogelijkheid en verbindingen tussen railsystemen met parallelle transformateren die bij falen niet kunnen worden geïsoleerd.
      - Een enkele transportroute waarlangs de capaciteit wijzigt, kan worden beschouwd als meerdere padsegmenten. Hieronder vallen uitlopers in het elektriciteitsnet die bestaan uit met moffen verbonden kabelsegmenten met steeds iets minder capaciteit, naarmate ze verder van het station af liggen.
      - Stationsautomatisering kan losse railsystemen als één geheel laten functioneren door telkens in groepen te schakelen. In die gevallen kan er sprake zijn van minder padsegmenten dan het netschema op het eerste oog doet lijken.
      - Padsegmenten kunnen netelementen delen. Hieronder vallen opstellingen met driewegstransformatoren, waarbij de primaire zijde van de transformator deel uitmaakt van twee padsegmenten.
    slots:
      - identificatie
    attributes:
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - "Afleidingsregel: gelijk aan de kleinste normale capaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        comments:
          - "Afleidingsregel: gelijk aan de kleinste noodcapaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      samengesteld uit:
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      van:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      naar:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Knooppunt:
    class_uri: Knooppunt
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: begin- of eindpunt van één of meer padsegmenten
    comments:
      - Overdrachtspunten (van aansluitingen) die hun transportbelasting projecteren op hetzelfde padsegment, worden functioneel als één knooppunt beschouwd.
    slots:
      - identificatie
    attributes:
      # relaties:
      deel van:
        range: Sectiegroep
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: 1..*
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Sectiegroep:
    class_uri: Sectiegroep
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: verzameling knooppunten die onderling door bediening met elkaar verbonden kunnen worden, waarbij die verbinding in standaardbediening niet actief is
    comments:
      - Lidmaatschap van een sectiegroep is onafhankelijk van de activiteitstoestand van de knooppunten.
    slots:
      - identificatie
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Geleidend netelement:
    class_uri: Geleidend-netelement
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: elementaire functionaliteit op een bepaalde plek in het energienet dat tenminste de (potentiële) geleiding van een energiedrager omvat
    slots:
      - identificatie
    attributes:
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - "Afleidingsregel: gelijk aan de kleinste normale capaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        comments:
          - De noodcapaciteit is doorgaans hoger dan de normale capaciteit omdat aangenomen wordt dat alternatieve bedieningssituaties kort duren.
          - "Afleidingsregel: gelijk aan de kleinste noodcapaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie

slots:
  identificatie:
    description: unieke aanduiding waarmee iets binnen een gegeven context ondubbelzinnig herkenbaar is
    range: Code
    required: true

enums:
  Netvlak:
    comments:
      - Netvlakken representeren functionele lagen voor het modelleren van transportcapaciteit en redundantie. Zij hoeven niet altijd overeen te komen met een fysisch spanningsniveau.
    permissible_values:
      EHS:
        description: extra hoogspanning
      HS:
        description: hoogspanning
      TS:
        description: tussenspanning
      Trafo HS+TS / MS:
        comments:
          - Dit netvlak hoort bij een transporteenheid die zich functioneel bevindt tussen een HS- of TS-transporteenheid en een MS-transporteenheid.
      MS:
        description: middenspanning
      Trafo MS/LS:
        comments:
          - Dit netvlak hoort bij een transporteenheid die zich functioneel bevindt tussen een MS-transporteenheid en een LS-transporteenheid.
      LS:
        description: laagspanning
  Richting:
    permissible_values:
      normatief:
        description: richting van energietransport die leidend is voor het ontwerp en de beoordeling van transportzekerheid
      tegengesteld:
        description: richting van energietransport tegengesteld aan de normatieve ontwerprichting
