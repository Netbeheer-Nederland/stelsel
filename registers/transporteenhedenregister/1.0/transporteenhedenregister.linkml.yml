id: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister
name: transporteenhedenregister
title: Transporteenhedenregister
version: 1.0-draft
description: "Het transporteenhedenregister beschrijft de transportcapaciteit van energienetten op drie samenhangende abstractieniveaus: netelementen, routedelen en transporteenheden. Deze niveaus maken expliciet op welk schaalniveau we redeneren over capaciteit in het net, en maken keuzes over netcongestie, wachtrijen en netuitbreidingen reproduceerbaar en uitlegbaar."
comments:
  - |
    Decennialang functioneerden onze energienetten met een schijnbare overvloed. De transportcapaciteit van het net was daardoor vooral een impliciete, interne aangelegenheid. Met de opkomst van netcongestie wordt het noodzakelijk om deze capaciteit expliciet en eenduidig te maken richting de maatschappij.

    Experts weten al hoe ze het net moeten interpreteren: zij groeperen netelementen en beoordelen afhankelijkheden op basis van ervaring. Dit model legt die denkwijze vast. Door netelementen, routedelen en transporteenheden strikt te scheiden, wordt expliciet gemaakt wanneer we delen van het net als één beschouwen en wanneer niet.

    Zo ontstaat een reproduceerbare vertaling van complexe netstructuren naar beschikbare ruimte voor de maatschappij. De transporteenheid vormt daarbij de gemeenschappelijke basis voor onder andere capaciteitsknelpunten, netuitbreidingen, congestiegebieden, wachtrijen en flexbehoeften.
  - |
    Om de status van het energienet eenduidig te communiceren, onderscheiden we de volgende transportcapaciteiten:

    * `aanwezig`: wat het net aankan
    * `benodigd`: nodig voor lopende transportovereenkomsten
    * `gevraagd`: nodig voor ingediende aanvragen
    * `regelbaar`: flexibele capaciteit om de pieken te scheren

    De optelsom:

    * `beschikbaar` = `aanwezig` - `benodigd`
    * `benodigd` + `gevraagd` > `aanwezig` = capaciteitsknelpunt
    * `benodigd` + `gevraagd` > `aanwezig` + `regelbaar` = congestiegebied

prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister#
  aansluitingenregister: https://modellen.netbeheernederland.nl/stelsel/registers/aansluitingenregister#
  marktpartijenregister: https://modellen.netbeheernederland.nl/stelsel/registers/marktpartijenregister#
  bce: https://wetten.overheid.nl/jci1.3:c:BWBR0052321&
default_prefix: this
imports:
  - ../../basiswaardesoorten
default_range: Tekst

classes:
  Capaciteitsdeling:
    class_uri: Capaciteitsdeling
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen routedelen waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netelementen
    annotations:
      tijdlijn_geldigheid: true
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      tussen:
        range: Routedeel
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Capaciteitsruimte:
    class_uri: Capaciteitsruimte
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: afgebakende context waarbinnen vraag en aanbod van transportcapaciteit op één of meerdere transporteenheden samenkomen
    comments:
      - Een capaciteitsruimte kan betrekking hebben op meerdere transporteenheden wanneer zij netelementen delen, zoals bij een driewegstransformator. Een gezamenlijke capaciteitsruimte kan echter ook ontstaan in een netstructuur met zowel seriële als parallelle routedelen, waarvoor als geheel redundantie-eisen gelden.
      - In complexe netstructuren (met een combinatie van serieel, parallel en redundant) kunnen meerdere mogelijke constructen worden geïdentificeerd als transporteenheid. De vuistregel is dat een construct als capaciteitsruimte wordt gemodelleerd in plaats van als transporteenheid wanneer het geen aanvullende transportcapaciteit toevoegt op enig knooppunt, maar uitsluitend de gezamenlijke benutting van bestaande transporteenheden begrenst.
      - Een transporteenheid is het niveau waarop netbeheerders de transportcapaciteiten bepalen (aanwezig, benodigd, beschikbaar), capaciteitsknelpunten signaleren, congestiegebieden afroepen en wachtrijen beheren.
    annotations:
      tijdlijn_geldigheid: true
    attributes:
      benodigde transportcapaciteit:
        exact_mappings:
          - begrip:7bs28 #benodigde transportcapaciteit
        comments:
          - De bendodigde transportcapaciteit is de capaciteit die nodig is om transportovereenkomsten uit te voeren, inclusief alternatieve transportrechten. Congestiebeheersdiensten, zoals capaciteitssturing, verlagen de benodigde transportcapaciteit niet, maar dragen bij aan de regelbare transportcapaciteit.
        range: Reëel getal
        unit:
          ucum_code: MW      
      redundantieniveau:
        description: aantal routedelen dat onbeschikbaar moet kunnen zijn zonder (lange) onderbreking van het energietransport
        range: Geheel getal
        required: true
      beoogde regelbare transportcapaciteit:
        description: in het netontwerp voorziene transportcapaciteit die door toepassing van regelmiddelen kan worden benut om overschrijding van de aanwezige transportcapaciteit te voorkomen
        source: bce:g=2026-04-25
        comments:
          - Regelmiddelen zijn onder andere het gecontroleerd afschakelen van zuivere invoeding, capaciteitssturing (inclusief statische capaciteitsbeperking) en redispatchbiedingen. Alternatieve transportrechten gelden niet als regelmiddel maar dragen bij aan de benodigde transportcapaciteit.
        required: true
        range: Decimaal getal
        unit:
          ucum_code: MW
      # relaties:
      op:
        range: Transporteenheid
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: 1..*
    unique_keys:
      identificatie:
        unique_key_slots:
          - op
  Geleidend netelement:
    class_uri: Geleidend-netelement
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: elementaire functionaliteit op een bepaalde plek in het energienet dat tenminste de (potentiële) geleiding van een energiedrager omvat
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        comments:
          - De noodcapaciteit is doorgaans hoger dan de normale capaciteit omdat aangenomen wordt dat alternatieve bedieningssituaties kort duren.
          - "Afleidingsregel: gelijk aan de kleinste noodcapaciteit van de geleidende netelementen waaruit het routedeel bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - "Afleidingsregel: gelijk aan de kleinste normale capaciteit van de geleidende netelementen waaruit het routedeel bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      verbonden met:
        range: Geleidend netelement
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Gelijktijdigheidsbeperking:
    class_uri: gelijktijdigheidsbeperking
    broad_mappings:
      - begrip:a4ejc #netfunctie
    annotations:
      tijdlijn_geldigheid: true
    description: beperking op het gelijktijdig actief zijn van routedelen
    attributes:
      # relaties:
      op:
        range: Routedeel
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - op
  Knooppunt:
    class_uri: Knooppunt
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: begin- of eindpunt van één of meer routedelen
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      # relaties:
      koppelbaar met:
        description: geeft aan dat de knooppunten via vooraf bepaalde bedieningshandelingen direct gekoppeld kunnen worden, waarbij die koppeling in standaardbediening niet actief is
        range: Knooppunt
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      op:
        description: wijst netelementen aan waarvoor geldt dat elk routedeel dat een van deze netelementen omvat, dit knooppunt als begin- of eindpunt heeft
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: 0..1
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Routedeel:
    class_uri: Routedeel
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: afzonderlijk relevante transportroute voor capaciteits- en faalscenario-analyse
    comments:
      - Een routedeel is een afgebakende mogelijkheid voor het verplaatsen van energie. Deze afbakening is zodanig dat zij alle relevante capaciteits- en faalscenario's eenduidig representeert. Bij elektriciteit vormen de railsystemen typisch deze afbakening. Het railsysteem wordt functioneel toegerekend aan alle inkomende en uitgaande routedelen die er gebruik van maken, omdat dit voor capaciteitsdeling relevant is. Railkoppelingen hoeven niet als routedelen te worden gezien, tenzij zij, in uitzonderlijke gevallen, afzonderlijk relevante faalscenario's of capaciteitsbeperkingen introduceren.
      - Een routedeel heeft een ontwerprichting. Daarmee representeert het de transportstructuur zoals die is ontworpen, niet zoals zij incidenteel wordt gebruikt.
      - In vermaasde netten zonder redundantie (zoals in sommige laagspanningsnetten) wijzen routedelen richting het balanspunt (het punt waar de stroomsterkte in de standaardbedieningssituatie in theorie nul is). Als een balanspunt zich in een verdeelkast bevindt, eindigen de betreffende routedelen bij die kast. Als een routedeel tussen twee kasten het balanspunt vormt, dan ontspringt vanuit elk van deze kasten een routedeel, dat het andere routedeel halverwege ontmoet.
      - Een transportroute waarin netelementen parallel staan opgesteld maar niet onafhankelijk kunnen falen, wordt als één routedeel beschouwd. Dit geldt onder andere voor parallelle kabels tussen stations zonder schakelmogelijkheid en routedelen tussen railsystemen met parallelle transformateren die bij falen niet kunnen worden geïsoleerd.
      - Stationsautomatisering kan ertoe leiden dat meerdere railsystemen functioneel als één geheel opereren. Indien deze automatisering maakt dat bepaalde routes geen afzonderlijk relevante faalscenario's vormen, dan worden zij samen als één routedeel beschouwd.
      - Een netelement kan gelijktijdig deel uitmaken van meer dan één routedeel. Dit komt standaard voor bij railsystemen. Een meer complex voorbeeld is een opstelling met een driewegstransformator. Daarbij maakt de wikkeling aan de primaire zijde deel uit van twee routedelen.
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      naar:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      samengesteld uit:
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      van:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Transporteenheid:
    class_uri: Transporteenheid
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: samenhangende transportmogelijkheid op een verzameling knooppunten, waarvan de benutting niet onafhankelijk kan worden opgesplitst
    comments:
      - Een transporteenheid wordt ontworpen met een normatieve ontwerprichtting. Dat is de richting waarin het energienet is ontworpen om energie betrouwbaar te leveren. Deze richting wordt soms aangeduid als 'afname', maar die term werkt verwarrend omdat er bijvoorbeeld aansluitingen bestaan die zijn ontworpen om in te voeden, zoals bij energieproducenten.
      - Een transporteenheid kan één routedeel bevatten (radiaal) of meerdere (standby, gesectioneerd, parallel).
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      netvlak:
        description: netvlak waarvoor deze transporteenheid de transportfunctie vervult
        range: Netvlak
        required: true
      richting:
        description: geeft aan of de transporteenheid wordt beschouwd in de normatieve ontwerprichting dan wel in de tegengestelde richting daarvan
        range: Richting
        required: true
      voedingsgebied:
        description: deel van het aardoppervlak waarop de aan deze transporteenheid direct gekoppelde aansluitingen zich bevinden of zijn beoogd te worden gerealiseerd
        comments:
          - Aansluitgebieden met veschillende netvlakken kunnen overlappen.
        range: Multivlak
      # relaties:
      afhankelijk van:
        description: B is afhankelijk van A als energietransport richting B verloopt via A.
        range: Transporteenheid
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      beheerd door:
        range: Marktpartij
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar door:
        description: overdrachtspunt via welke de transportcapaciteit wordt ontsloten (herkomst)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een energieproducent of bovenliggende netkoppeling.
          - Deze relatie is verplicht als de transporteenheid niet uit routedelen bestaat, anders verboden.
        range: Overdrachtspunt
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar op:
        description: knooppunt waarop de transportcapaciteit beschikbaar is onder het geldende redundantieniveau
        range: Knooppunt
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      beschikbaar voor:
        description: overdrachtspunt waaraan de transportcapaciteit wordt geleverd (bestemming)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een huisaansluiting.
          - "Een transporteenheid met deze relatie bestaat uit de netelementen die de aansluitverbinding realiseren."
        range: Overdrachtspunt
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: 0..1
      samengesteld uit:
        range: Routedeel
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie

  # verwijzingen naar externe entiteiten:
  Marktpartij:
    class_uri: marktpartijenregister:Marktpartij
    annotations:
      external_registry: Marktpartijenregister
  Overdrachtspunt:
    class_uri: aansluitingenregister:Overdrachtspunt
    annotations:
      external_registry: Aansluitingenregister

slots:
  identificatie:
    description: unieke aanduiding waarmee iets binnen een gegeven context ondubbelzinnig herkenbaar is
    range: Code
    required: true

enums:
  Netvlak:
    description: deel van het energienet waarvoor geldt dat de verbruikers aangesloten op dit deel van het net eenzelfde tarief in rekening krijgen
    source: bce:g=2026-04-25
    comments:
      - Netvlakken hoeven niet altijd overeen te komen met een fysisch spanningsniveau.
    permissible_values:
      EHS:
        description: extra hoogspanning
      HS:
        description: hoogspanning
      TS:
        description: tussenspanning
      Trafo HS+TS / MS:
      MS:
        description: middenspanning
      Trafo MS/LS:
      LS:
        description: laagspanning
  Richting:
    permissible_values:
      normatief:
        description: richting van energietransport die leidend is voor het ontwerp en de beoordeling van transportzekerheid
      tegengesteld:
        description: richting van energietransport tegengesteld aan de normatieve ontwerprichting

types:
  Multivlak:
    description: ruimtelijke aanduiding van een samenstel van delen van het aardoppervlak
    comments:
      - Equivalent aan `GM_MultiSurface` in ISO 19107.
