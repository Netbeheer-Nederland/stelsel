id: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister
name: transporteenhedenregister
title: Transporteenhedenregister
version: 1.0-draft
description: "Het transporteenhedenregister beschrijft de transportcapaciteit van energienetten op drie samenhangende abstractieniveaus: netelementen, verbindingen en transporteenheden. Hierdoor worden keuzes over netcongestie, wachtrijen en netuitbreidingen reproduceerbaar en uitlegbaar."
comments: |
  Decennialang functioneerden onze energienetten met een schijnbare overvloed. De transportcapaciteit van het net was daarom voornamelijk een interne aangelegenheid. Netcongestie maakt het nu noodzakelijk om deze transportcapaciteit transparant te maken richting de maatschappij.

  Net zoals de telecomsector verschoof van het beheren van 'kabels' naar het dynamisch sturen op 'bandbreedte', maakt dit model de transportcapaciteit los van de interne techniek. Het model is bedrieglijk eenvoudig, maar de impact is fundamenteel. Door netelementen, verbindingen en transporteenheden strikt te scheiden, slaan we de brug tussen technicus en beleidsmaker. Het resultaat is een reproduceerbare vertaling van complexe netstructuren naar beschikbare ruimte voor de maatschappij. De transporteenheid vormt hierbij de gemeenschappelijke deler tussen onder andere capaciteitsknelpunten, netuitbreidingen, congestiegebieden, wachtrijen en flexbehoeften.
  
  Om de status van het energienet eenduidig te communiceren, onderscheiden we de volgende transportcapaciteiten:

  * `aanwezig`: wat het net aankan
  * `benodigd`: nodig voor lopende transportovereenkomsten
  * `gevraagd`: nodig voor ingediende aanvragen
  * `regelbaar`: flexibele capaciteit om de pieken te scheren

  De optelsom:

  * `beschikbaar` = `aanwezig` - `benodigd`
  * `benodigd` + `gevraagd` > `aanwezig` = capaciteitsknelpunt
  * `benodigd` + `gevraagd` > `aanwezig` + `regelbaar` = congestiegebied

prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister#
  aansluitingenregister: https://modellen.netbeheernederland.nl/stelsel/registers/aansluitingenregister#
  marktpartijenregister: https://modellen.netbeheernederland.nl/stelsel/registers/marktpartijenregister#
  bce: https://wetten.overheid.nl/jci1.3:c:BWBR0052321&
default_prefix: this
imports:
  - ../../basiswaardesoorten
default_range: Tekst

classes:
  Capaciteitsdeling tussen verbindingen:
    class_uri: Capaciteitsdeling-tussen-verbindingen
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen verbindingen waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netelementen
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      tussen:
        range: Verbinding
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Capaciteitsdeling tussen transporteenheden:
    class_uri: Capaciteitsdeling-tussen-transporteenheden
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen transporteenheden waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netstructuur
    attributes:
      aanwezige transportcapaciteit:
        exact_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        range: Reëel getal
        required: true
        unit:
          ucum_code: MW
      beschikbare transportcapaciteit:
        description: deel van de aanwezige transportcapaciteit dat niet wordt ingezet om aan de benodigde transportcapaciteit te voldoen
        source: bce:g=2026-04-25
        comments:
          - "Validatieregel: gelijk aan het verschil tussen de aanwezige transportcapaciteit en de som van de benodigde transportcapaciteiten van de betrokken transporteenheden."
        range: Reëel getal
        unit:
          ucum_code: MW
      # relaties:
      tussen:
        range: Transporteenheid
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Geleidend netelement:
    class_uri: Geleidend-netelement
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: elementaire functionaliteit op een bepaalde plek in het energienet dat tenminste de (potentiële) geleiding van een energiedrager omvat
    slots:
      - identificatie
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        comments:
          - De noodcapaciteit is doorgaans hoger dan de normale capaciteit omdat aangenomen wordt dat alternatieve bedieningssituaties kort duren.
          - "Afleidingsregel: gelijk aan de kleinste noodcapaciteit van de geleidende netelementen waaruit de verbinding bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - "Afleidingsregel: gelijk aan de kleinste normale capaciteit van de geleidende netelementen waaruit de verbinding bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Knooppunt:
    class_uri: Knooppunt
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: begin- of eindpunt van één of meer verbindingen
    comments:
      - Een knooppunt fungeert als een logisch verzamelpunt. Terwijl een beginpunt in een netschema vaak samenvalt met één fysiek voedingspunt (zoals een veld op een railsysteem), vertegenwoordigt een eindpunt de geaggregeerde 'afgifte-omtrek' van de verbinding. Dit omvat zowel het railsysteem waarop de verbinding termineert als alle netaansluitpunten die onderweg hun transportbelasting op dit segment projecteren.
    slots:
      - identificatie
    attributes:
      # relaties:
      deel van:
        range: Sectiegroep
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: 1..*
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Sectiegroep:
    class_uri: Sectiegroep
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: verzameling knooppunten die via vooraf bepaalde bedieningshandelingen gekoppeld kunnen worden, waarbij die koppeling in standaardbediening niet actief is
    slots:
      - identificatie
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Transporteenheid:
    class_uri: Transporteenheid
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: deel van het energienet dat in samenhang moet worden beschouwd om de aanwezige transportcapaciteit te kunnen bepalen
    comments:
      - Een transporteenheid wordt ontworpen met een normatieve ontwerprichtting. Dat is de richting waarin het energienet is ontworpen om energie betrouwbaar te leveren. Deze richting wordt soms aangeduid als 'afname', maar die term werkt verwarrend omdat er bijvoorbeeld aansluitingen bestaan die zijn ontworpen om in te voeden, zoals bij energieproducenten.
      - Een transporteenheid kan één verbinding bevatten (radiaal) of meerdere (standby, gesectioneerd, parallel).
      - Een transporteenheid is het niveau waarop netbeheerders de transportcapaciteiten bepalen (aanwezig, benodigd, beschikbaar), capaciteitsknelpunten signaleren, congestiegebieden afroepen en wachtrijen beheren.
    slots:
      - identificatie
    attributes:
      aansluitgebied:
        description: deel van het aardoppervlak waarvoor nieuwe aansluitingen in beginsel rechtstreeks bij deze transporteenheid uitkomen
        comments:
          - Aansluitgebieden met veschillende netvlakken kunnen overlappen.
        range: Multivlak
      benodigde transportcapaciteit:
        exact_mappings:
          - begrip:7bs28 #benodigde transportcapaciteit
        comments:
          - De bendodigde transportcapaciteit is de capaciteit die nodig is om transportovereenkomsten uit te voeren, inclusief alternatieve transportrechten. Congestiebeheersdiensten, zoals capaciteitssturing, verlagen de benodigde transportcapaciteit niet, maar dragen bij aan de regelbare transportcapaciteit.
        range: Reëel getal
        unit:
          ucum_code: MW      
      individuele aanwezige transportcapaciteit:
        broad_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        description: aanwezige transportcapaciteit van een afzonderlijke transporteenheid, zonder rekening te houden met gelijktijdige belasting door andere transporteenheden
        comments:
          - "Afleidingsregel: de kleinste waarde, over alle relevante scenario's, van de meest beperkende factor tussen de verbindingen en de gedeelde netelementen in dat scenario."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MW
      individuele beschikbare transportcapaciteit:
        description: deel van de individuele aanwezige transportcapaciteit dat niet wordt ingezet om aan de benodigde transportcapaciteit te voldoen
        source: bce:g=2026-04-25
        range: Reëel getal
        unit:
          ucum_code: MW
      gevraagde transportcapaciteit:
        exact_mappings:
          - begrip:7n44w #gevraagde transportcapaciteit
        range: Reëel getal
        unit:
          ucum_code: MW
      netvlak:
        description: netvlak waarvoor deze transporteenheid de transportfunctie vervult
        range: Netvlak
        required: true
      redundatieniveau:
        description: aantal verbindingen dat onbeschikbaar kan zijn zonder (lange) onderbreking van het energietransport
        range: Geheel getal
        required: true
      regelbare transportcapaciteit:
        description: transportcapaciteit die door toepassing van regelmiddelen kan worden benut om overschrijding van de aanwezige transportcapaciteit te voorkomen
        source: bce:g=2026-04-25
        comments:
          - Regelmiddelen zijn onder andere het gecontroleerd afschakelen van zuivere invoeding, capaciteitssturing (inclusief statische capaciteitsbeperking) en redispatchbiedingen. Alternatieve transportrechten gelden niet als regelmiddel maar dragen bij aan de benodigde transportcapaciteit.
        required: true
        range: Reëel getal
        unit:
          ucum_code: MW
      richting:
        description: geeft aan of de transporteenheid wordt beschouwd in de normatieve ontwerprichting dan wel in de tegengestelde richting daarvan
        range: Richting
        required: true
      # relaties:
      beheerd door:
        range: Marktpartij
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar door:
        description: overdrachtspunt via welke de transportcapaciteit wordt ontsloten (herkomst)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een energieproducent of bovenliggende netkoppeling.
          - Deze relatie is verplicht als de transporteenheid niet uit verbindingen bestaat, anders verboden.
        range: Overdrachtspunt
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar voor:
        description: overdrachtspunt waaraan de transportcapaciteit wordt geleverd (bestemming)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een huisaansluiting.
          - "Een transporteenheid met deze relatie bestaat uit de netelementen die de aansluitverbinding realiseren."
        range: Overdrachtspunt
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      samengesteld uit:
        range: Verbinding
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      volgend op:
        description: B is volgend op A indien energietransport richting B verloopt via A.
        range: Transporteenheid
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Verbinding:
    class_uri: Verbinding
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: afzonderlijk relevante transportroute voor capaciteits- en faalscenario-analyse
    comments:
      - Een verbinding is een afgebakende mogelijkheid voor het verplaatsen van energie. Deze afbakening is zodanig dat zij alle relevante capaciteits- en faalscenario's eenduidig representeert. Bij elektriciteit vormen de railsystemen typisch deze afbakening. Het railsysteem wordt functioneel toegerekend aan alle inkomende en uitgaande verbindingen die er gebruik van maken, omdat dit voor capaciteitsdeling relevant is. Railkoppelingen worden niet als verbindingen gezien, tenzij zij, in uitzonderlijke gevallen, afzonderlijk relevante faalscenario's of capaciteitsbeperkingen introduceren.
      - "Een verbinding heeft een ontwerprichting: van een geconcentreerd punt in het energienet naar een geaggregeerde afgifte-omtrek. Daarmee representeert het de transportstructuur zoals die is ontworpen, niet zoals zij incidenteel wordt gebruikt."
      - In vermaasde netten zonder redundantie (zoals in sommige laagspanningsnetten) wijzen verbindingen richting het balanspunt (het punt waar de stroomsterkte in de standaardbedieningssituatie in theorie nul is). Als een balanspunt zich in een verdeelkast bevindt, eindigen de betreffende verbindingen bij die kast. Als een verbinding tussen twee kasten het balanspunt vormt, dan ontspringt vanuit elk van deze kasten een verbinding, dat de andere verbinding halverwege de verbinding ontmoet, in een knooppunt waar eventuele huisaansluitingen topologisch weer op in kunnen prikken.
      - Een transportroute waarin netelementen parallel staan opgesteld maar niet onafhankelijk kunnen falen, wordt als één verbinding beschouwd. Dit geldt onder andere voor parallelle kabels tussen stations zonder schakelmogelijkheid en verbindingen tussen railsystemen met parallelle transformateren die bij falen niet kunnen worden geïsoleerd.
      - Stationsautomatisering kan ertoe leiden dat meerdere railsystemen functioneel als één geheel opereren. Indien deze automatisering maakt dat bepaalde routes geen afzonderlijk relevante faalscenario's vormen, dan worden zij samen als één verbinding beschouwd.
      - Een netelement kan gelijktijdig deel uitmaken van meer dan één verbinding. Dit komt standaard voor bij railsystemen. Een meer complex voorbeeld is een opstelling met een driewegstransformator. Daarbij maakt de wikkeling aan de primaire zijde deel uit van twee verbindingen.
    slots:
      - identificatie
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      naar:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      samengesteld uit:
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      van:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie

  # verwijzingen naar externe entiteiten:
  Marktpartij:
    class_uri: marktpartijenregister:Marktpartij
    annotations:
      external_registry: Marktpartijenregister
  Overdrachtspunt:
    class_uri: aansluitingenregister:Overdrachtspunt
    annotations:
      external_registry: Aansluitingenregister

slots:
  identificatie:
    description: unieke aanduiding waarmee iets binnen een gegeven context ondubbelzinnig herkenbaar is
    range: Code
    required: true

enums:
  Netvlak:
    description: deel van het energienet waarvoor geldt dat de verbruikers aangesloten op dit deel van het net eenzelfde tarief in rekening krijgen
    source: bce:g=2026-04-25
    comments:
      - Netvlakken hoeven niet altijd overeen te komen met een fysisch spanningsniveau.
    permissible_values:
      EHS:
        description: extra hoogspanning
      HS:
        description: hoogspanning
      TS:
        description: tussenspanning
      Trafo HS+TS / MS:
      MS:
        description: middenspanning
      Trafo MS/LS:
      LS:
        description: laagspanning
  Richting:
    permissible_values:
      normatief:
        description: richting van energietransport die leidend is voor het ontwerp en de beoordeling van transportzekerheid
      tegengesteld:
        description: richting van energietransport tegengesteld aan de normatieve ontwerprichting

types:
  Multivlak:
    description: ruimtelijke aanduiding van een samenstel van delen van het aardoppervlak
    comments:
      - Equivalent aan `GM_MultiSurface` in ISO 19107.
