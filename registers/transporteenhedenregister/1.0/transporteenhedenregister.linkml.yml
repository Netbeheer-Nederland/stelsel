id: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister
name: transporteenhedenregister
title: Transporteenhedenregister
version: 1.0-draft
description: "Het transporteenhedenregister beschrijft de transportcapaciteit van energienetten op drie samenhangende abstractieniveaus: netelementen, routedelen en transporteenheden. Deze niveaus maken expliciet op welk schaalniveau we redeneren over capaciteit in het net, en maken keuzes over netcongestie, wachtrijen en netuitbreidingen reproduceerbaar en uitlegbaar."
comments:
  - |
    Decennialang functioneerden onze energienetten met een schijnbare overvloed. De transportcapaciteit van het net was daardoor vooral een interne aangelegenheid. Met de opkomst van netcongestie wordt het noodzakelijk om deze capaciteit expliciet te maken richting de maatschappij. Dat doen we door de elementen in dat net op verschillende niveaus te groeperen en aan die groeperingen stabiele identificaties toe te wijzen. Zo ontstaat een reproduceerbare vertaling van complexe netstructuren naar aanwezige ruimte voor de maatschappij. De transporteenheid vormt daarbij de gemeenschappelijke basis voor onder andere capaciteitsknelpunten, netuitbreidingen, congestiegebieden, wachtrijen en flexbehoeften.
  - |
    Om de status van het energienet eenduidig te communiceren, onderscheiden we de volgende transportcapaciteiten:

    * `aanwezig`: wat het net aankan
    * `benodigd`: nodig voor lopende transportovereenkomsten
    * `gevraagd`: nodig voor ingediende aanvragen
    * `regelbaar`: flexibele capaciteit om de pieken te scheren

    De optelsom:

    * `beschikbaar` = `aanwezig` - `benodigd`
    * `benodigd` + `gevraagd` > `aanwezig` = capaciteitsknelpunt
    * `benodigd` + `gevraagd` > `aanwezig` + `regelbaar` = congestiegebied

prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister#
  aansluitingenregister: https://modellen.netbeheernederland.nl/stelsel/registers/aansluitingenregister#
  marktpartijenregister: https://modellen.netbeheernederland.nl/stelsel/registers/marktpartijenregister#
  bce: https://wetten.overheid.nl/jci1.3:c:BWBR0052321&
default_prefix: this
imports:
  - ../../basiswaardesoorten
default_range: Tekst

classes:
  Capaciteitsdeling:
    class_uri: Capaciteitsdeling
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen routedelen waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netelementen
    annotations:
      tijdlijn_geldigheid: true
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      tussen:
        range: Routedeel
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Gelijktijdigheidsbeperking:
    class_uri: gelijktijdigheidsbeperking
    broad_mappings:
      - begrip:a4ejc #netfunctie
    annotations:
      tijdlijn_geldigheid: true
    description: beperking op het gelijktijdig actief zijn van routedelen
    attributes:
      # relaties:
      op:
        range: Routedeel
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - op
  Gericht routedeel:
    class_uri: Gericht-routedeel
    is_a: Routedeel
    description: routedeel met een ontworpen transportrichting (van stroomopwaarts naar stroomafwaarts)
    attributes:
      # relaties:
      naar:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      van:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
  Ongericht routedeel:
    class_uri: Ongericht-routedeel
    is_a: Routedeel
    description: routedeel zonder ontworpen transportrichting
    comments:
      - Bijvoorbeeld een (capaciteitsbeperkende) railkoppeling of symmetrische verbinding.
    attributes:
      # relaties:
      tussen:
        range: Knooppunt
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
  Knooppunt:
    class_uri: Knooppunt
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: begin- of eindpunt van één of meer routedelen
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      netvlak:
        description: deel van het energienet waarvoor geldt dat de netgebruikers aangesloten op dit deel van het net eenzelfde tarief in rekening krijgen
        source: bge:g=2026-07-09
        range: Netvlak
        required: true
      voedingsgebied:
        description: deel van het aardoppervlak waarop de aan dit knooppunt gekoppelde overdrachtspunten van aansluitingen zich bevinden of zijn beoogd te worden gerealiseerd
        comments:
          - Voedingsgebieden kunnen overlappen.
        range: Multivlak
      # relaties:
      schakelbaar met:
        description: geeft aan dat de knooppunten via bedieningshandelingen direct elektrisch gekoppeld kunnen worden, en/of dat de aangesloten routedelen flexibel tussen deze knooppunten omgeschakeld kunnen worden, waarbij deze koppeling of omschakeling in de standaardbedieningssituatie niet actief is
        range: Knooppunt
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      toegang voor:
        description: geeft aan dat het knooppunt fungeert als de functionele toegangspoort tot het energienet voor het overdrachtspunt (het contractuele gebruiksrecht van de klant)
        range: Overdrachtspunt
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      op:
        description: wijst netelementen aan waarvoor geldt dat elk routedeel dat een van deze netelementen omvat, dit knooppunt als begin- of eindpunt heeft
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: 0..1
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Routedeel:
    class_uri: Routedeel
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: afzonderlijk relevante transportroute voor capaciteits- en faalscenario-analyse
    comments:
      - Een routedeel is een afgebakende mogelijkheid voor het verplaatsen van energie. Deze afbakening is zodanig dat zij alle relevante capaciteits- en faalscenario's eenduidig representeert. Bij elektriciteit vormen de railsystemen typisch deze afbakening. Het railsysteem wordt functioneel toegerekend aan alle inkomende en uitgaande routedelen die er gebruik van maken, omdat dit voor capaciteitsdeling relevant is. Railkoppelingen hoeven niet als routedelen te worden gezien, tenzij zij, in uitzonderlijke gevallen, afzonderlijk relevante faalscenario's of capaciteitsbeperkingen introduceren.
      - Een routedeel heeft een ontwerprichting. Daarmee representeert het de transportstructuur zoals die is ontworpen, niet zoals zij incidenteel wordt gebruikt.
      - In vermaasde netten zonder storingsreserve (zoals in sommige laagspanningsnetten) wijzen routedelen richting het balanspunt (het punt waar de stroomsterkte in de standaardbedieningssituatie in theorie nul is). Als een balanspunt zich in een verdeelkast bevindt, eindigen de betreffende routedelen bij die kast. Als een routedeel tussen twee kasten het balanspunt vormt, dan ontspringt vanuit elk van deze kasten een routedeel, dat het andere routedeel halverwege ontmoet.
      - Een transportroute waarin netelementen parallel staan opgesteld maar niet onafhankelijk kunnen falen, wordt als één routedeel beschouwd. Dit geldt onder andere voor parallelle kabels tussen stations zonder schakelmogelijkheid en routedelen tussen railsystemen met parallelle transformateren die bij falen niet kunnen worden geïsoleerd.
      - Stationsautomatisering kan ertoe leiden dat meerdere railsystemen functioneel als één geheel opereren. Indien deze automatisering maakt dat bepaalde routes geen afzonderlijk relevante faalscenario's vormen, dan worden zij samen als één routedeel beschouwd.
      - Een netelement kan gelijktijdig deel uitmaken van meer dan één routedeel. Dit komt standaard voor bij railsystemen. Een meer complex voorbeeld is een opstelling met een driewegstransformator. Daarbij maakt de wikkeling aan de primaire zijde deel uit van twee routedelen.
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Decimaal getal
        unit:
          ucum_code: MVA
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - De capaciteit van een routedeel in een elektriciteitsnet wordt in eerste instantie bepaald door de thermische zwakste schakel van de onderliggende netelementen. Omdat een routedeel echter een specifieke lengte en impedantie heeft, is dit ook het niveau waarop spanningsval en spanningsopdrijving (als ontwerpaannamen) voor het eerst ontstaan.
        required: true
        range: Decimaal getal
        unit:
          ucum_code: MVA
      standaard toestand:
        description: bedieningssituatie waarin het routedeel zich volgens ontwerp standaard bevindt
        required: true
        range: Toestand
      # relaties:
      begrensd door:
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Storingsreserve:
    class_uri: Storingsreserve
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: groepering van routedelen die elkaar bij uitval kunnen opvangen om de transportzekerheid te garanderen
    annotations:
      tijdlijn_geldigheid: true
    attributes:
      richting:
        description: ontwerprichting waarop de storingsreserve van toepassing is
        range: Ontwerprichting
        required: true
      niveau:
        description: aantal routedelen dat onbeschikbaar moet kunnen zijn zonder (lange) onderbreking van de transportdienst
        comments:
          - Waarde 0 staat voor geen reserve (N-0). Waarde 1 staat voor enkelvoudige storingsreserve (N-1). Waarde 2 staat voor tweevoudige storingsreserve (N-2).
        range: Geheel getal
        required: true
      topologie:
        description: manier waarop de begrenzende routedelen topologisch met elkaar samenhangen
        required: true
        range: Begrenzingstopologie
      # relaties:
      begrensd door:
        range: Routedeel
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - begrensd door
          - identificatie
  Transporteenheid:
    class_uri: Transporteenheid
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: samenhangende transportmogelijkheid op een verzameling knooppunten, waarvan de benutting niet onafhankelijk kan worden opgesplitst
    annotations:
      tijdlijn_geldigheid: true
    slots:
      - identificatie
    attributes:
      aanwezige transportcapaciteit:
        exact_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        range: Decimaal getal
        unit:
          ucum_code: MW
      richting:
        description: geeft aan of de transporteenheid stroomafwaarts dan wel stroomopwaarts wordt beschouwd
        range: Ontwerprichting
        required: true
      # relaties:
      beheerd door:
        range: Marktpartij
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar door:
        description: overdrachtspunt via welke de transportcapaciteit wordt ontsloten (herkomst)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een energieproducent of bovenliggende netkoppeling.
        range: Overdrachtspunt
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      gezamenlijke bovengrens voor:
        description: geeft aan dat de transporteenheid de maximale transportcapaciteit begrenst voor de betreffende knooppunten gezamenlijk
        comments:
          - Dit is een afgeleide relatie waarbij de som van de benodigde transportcapaciteiten op deze knooppunten de aanwezige transportcapaciteit van de transporteenheid niet mag overschrijden (tenzij er regelbaar vermogen wordt ingezet).
        range: Knooppunt
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie

  # verwijzingen naar externe entiteiten:
  Marktpartij:
    class_uri: marktpartijenregister:Marktpartij
    annotations:
      external_registry: Marktpartijenregister
  Overdrachtspunt:
    class_uri: aansluitingenregister:Overdrachtspunt
    annotations:
      external_registry: Aansluitingenregister

slots:
  identificatie:
    description: unieke aanduiding waarmee iets binnen een gegeven context ondubbelzinnig herkenbaar is
    range: Code
    required: true

enums:
  Begrenzingstopologie:
    permissible_values:
      parallel:
        description: begrenzing van direct parallelle verbindingen
        comments:
          - De zone bestaat uitsluitend uit de begrenzende routedelen zélf.
      ring:
        description: begrenzing van een lusvormige netwerkstructuur
        comments:
          - De zone bestaat uit het kortste pad tussen de begrenzende routedelen, inclusief die routedelen.
      vermaasd:
        description: begrenzing van een complexe netwerkstructuur met meer dan twee grenzen
        comments:
          - De zone bestaat uit álle paden die volledig besloten liggen binnen de 3, 4 of meer opgegeven grens-routedelen (de gesloten snede).
  Netvlak:
    description: deel van het energienet waarvoor geldt dat de netgebruikers aangesloten op dit deel van het net eenzelfde tarief in rekening krijgen
    source: bce:g=2026-07-09
    comments:
      - Netvlakken hoeven niet altijd overeen te komen met een fysisch spanningsniveau.
    permissible_values:
      EHS:
        description: extra hoogspanning
      HS:
        description: hoogspanning
      TS:
        description: tussenspanning
      Trafo HS+TS / MS:
      MS:
        description: middenspanning
      Trafo MS/LS:
      LS:
        description: laagspanning
  Ontwerprichting:
    permissible_values:
      stroomafwaarts:
        description: transport vanaf een centrale invoeder naar decentrale afnemers
      stroomopwaarts:
        description: transport vanaf decentrale invoeders naar een bovenliggend energienet
  Standaard toestand:
    permissible_values:
      onderbroken:
      verbonden:

types:
  Multivlak:
    description: ruimtelijke aanduiding van een samenstel van delen van het aardoppervlak
    comments:
      - Equivalent aan `GM_MultiSurface` in ISO 19107.
