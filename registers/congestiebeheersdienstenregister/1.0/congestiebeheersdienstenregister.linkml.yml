id: https://modellen.netbeheernederland.nl/stelsel/registers/congestiebeheersdienstenregister
name: congestiebeheersdienstenregister
title: Congestiebeheersdienstenregister
version: 1.0-draft
description: Dit model bevindt zich in een vroege fase van ontwikkeling en bevat daarom nog geen definities.
comments:
  - "Het proces bij biedingen redispatch doorloopt de volgende stappen: redispatchbehoefte, biedingsverzoek, bieding redispatch, afroepadvies, afroep van redispatch."
  - |
    Mapping op GOPACS-termen:
    - accounting point: Allocatiepunt
    - aggregatie: Capaciteitssturingsdienst
    - bescherming: Redispatchrestrictie
    - biedplichtcontract: Redispatchcapaciteit
    - BritNed: Netkoppeling
    - clearing: Afroep van bieding redispatch
    - gebied: Routedeel
    - grid connection: Aansluiting, Allocatiepunt, Capaciteitssturingsdienst, Netkoppeling, Redispatchdeelname
    - market evaluation point: Aansluiting
    - marktbericht: Biedingsverzoek
    - netelement: Routedeel
    - oplossing: Afroepadvies
    - order: Bieding redispatch
    - periode: Capaciteitssturingspatroon
    - probleem: Redispatchbehoefte
see_also:
  - sce:hoofdstuk=9&paragraaf=9.2&artikel=9.14&g=2026-07-01
prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/congestiebeheersdienstenregister#
  aansluitingenregister: https://modellen.netbeheernederland.nl/stelsel/registers/aansluitingenregister#
  marktpartijenregister: https://modellen.netbeheernederland.nl/stelsel/registers/marktpartijenregister#
  transporteenhedenregister: https://modellen.netbeheernederland.nl/stelsel/registers/transporteenhedenregister#
  sce: https://wetten.overheid.nl/jci1.3:c:BWBR0052336&
imports:
  - ../../basiswaardesoorten
default_prefix: this
default_range: Tekst

