id: https://modellen.netbeheernederland.nl/stelsel/registers/netfunctieregister
name: netfunctieregister
title: Netfunctieregister
version: 1.0-draft
description: Het netfunctieregister legt de transportcapaciteiten van energienetten vast op drie samenhangende abstractieniveaus (netelementen, padsegmenten en transporteenheden). Hierdoor worden keuzes over congestie, wachtrijen en uitbreidingen reproduceerbaar en uitlegbaar.
comments: |
  Het netfunctieregister beschrijft wat het net volgens ontwerp moet kunnen, niet hoe het net op enig moment staat geschakeld.

  De transportcapaciteit van een transporteenheid wordt bepaald door zowel de beschikbare padsegmenten als door netelementen die door meerdere paden worden gedeeld, zoals railsystemen en driewegstransformatoren. Door deze samenhang expliciet te modelleren, wordt de bepaling van transportcapaciteit stabiel, herleidbaar en toepasbaar in congestiebeheer.

  Over het algemeen geldt:

  * `beschikbaar` = `aanwezig` - `benodigd`
  * `benodigd` + `gevraagd` > `aanwezig`: capaciteitsknelpunt
  * `benodigd` + `gevraagd` > `aanwezig` + `regelbaar`: congestiegebied

prefixes:
  linkml: https://w3id.org/linkml/
  begrip: https://begrippen.netbeheernederland.nl/id/
  this: https://modellen.netbeheernederland.nl/stelsel/registers/netfunctieregister#
  aansluitingenregister: https://modellen.netbeheernederland.nl/stelsel/registers/aansluitingenregister#
  marktpartijenregister: https://modellen.netbeheernederland.nl/stelsel/registers/marktpartijenregister#
  bce: https://wetten.overheid.nl/jci1.3:c:BWBR0052321&
default_prefix: this
imports:
  - ../../basiswaardesoorten
default_range: Tekst

classes:
  Transporteenheid:
    class_uri: Transporteenheid
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: deel van het energienet dat in samenhang moet worden beschouwd om de aanwezige transportcapaciteit te kunnen bepalen
    comments:
      - Een transporteenheid wordt ontworpen met een normatieve ontwerprichtting. Dat is de richting waarin het energienet is ontworpen om energie betrouwbaar te leveren. Deze richting wordt soms aangeduid als 'afname', maar die term werkt verwarrend omdat er bijvoorbeeld aansluitingen bestaan die zijn ontworpen om in te voeden, zoals bij energieproducenten.
      - Een transporteenheid kan één padsegment bevatten (radiaal) of meerdere (standby, gesectioneerd, parallel).
      - Een transporteenheid is het niveau waarop netbeheerders de transportcapaciteiten bepalen (aanwezig, benodigd, beschikbaar), capaciteitsknelpunten signaleren, congestiegebieden afroepen en wachtrijen beheren.
    slots:
      - identificatie
    attributes:
      richting:
        description: geeft aan of de transporteenheid wordt beschouwd in de normatieve ontwerprichting dan wel in de tegengestelde richting daarvan
        range: Richting
        required: true
      netvlak:
        description: netvlak waarvoor deze transporteenheid de transportfunctie vervult
        range: Netvlak
        required: true
      redundatieniveau:
        description: aantal padsegmenten dat onbeschikbaar kan zijn zonder (lange) onderbreking van het energietransport
        range: Geheel getal
        required: true
      individuele aanwezige transportcapaciteit:
        broad_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        description: aanwezige transportcapaciteit van een afzonderlijke transporteenheid, zonder rekening te houden met gelijktijdige belasting door andere transporteenheden
        comments:
          - "Afleidingsregel: de kleinste waarde, over alle relevante scenario's, van de meest beperkende factor tussen de padsegmenten en de gedeelde netelementen in dat scenario."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MW
      regelbare transportcapaciteit:
        description: transportcapaciteit die door toepassing van regelmiddelen kan worden benut om overschrijding van de aanwezige transportcapaciteit te voorkomen
        source: bce:g=2026-04-25
        comments:
          - Regelmiddelen zijn onder andere het gecontroleerd afschakelen van zuivere invoeding, capaciteitssturing (inclusief statische capaciteitsbeperking) en redispatchbiedingen. Alternatieve transportrechten gelden niet als regelmiddel maar dragen bij aan de benodigde transportcapaciteit.
        required: true
        range: Reëel getal
        unit:
          ucum_code: MW
      benodigde transportcapaciteit:
        exact_mappings:
          - begrip:7bs28 #benodigde transportcapaciteit
        comments:
          - De bendodigde transportcapaciteit is de capaciteit die nodig is om transportovereenkomsten uit te voeren, inclusief alternatieve transportrechten. Congestiebeheersdiensten, zoals capaciteitssturing, verlagen de benodigde transportcapaciteit niet, maar dragen bij aan de regelbare transportcapaciteit.
        range: Reëel getal
        unit:
          ucum_code: MW      
      individuele beschikbare transportcapaciteit:
        description: deel van de individuele aanwezige transportcapaciteit dat niet wordt ingezet om aan de benodigde transportcapaciteit te voldoen
        source: bce:g=2026-04-25
        range: Reëel getal
        unit:
          ucum_code: MW
      gevraagde transportcapaciteit:
        exact_mappings:
          - begrip:7n44w #gevraagde transportcapaciteit
        range: Reëel getal
        unit:
          ucum_code: MW
      # relaties:
      samengesteld uit:
        range: Padsegment
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      volgend op:
        description: B is volgend op A indien energietransport richting B verloopt via A.
        range: Transporteenheid
        required: false
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      beheerd door:
        range: Marktpartij
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar door:
        description: overdrachtspunt via welke de transportcapaciteit wordt ontsloten (herkomst)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een energieproducent of bovenliggende netkoppeling.
        range: Overdrachtspunt
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      beschikbaar voor:
        description: overdrachtspunt waaraan de transportcapaciteit wordt geleverd (bestemming)
        comments:
          - Bijvoorbeeld het overdrachtspunt van een huisaansluiting.
          - "Een transporteenheid met deze relatie bestaat uit de netelementen die de aansluitverbinding realiseren."
        range: Overdrachtspunt
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Capaciteitsdeling tussen padsegmenten:
    class_uri: Capaciteitsdeling-tussen-padsegmenten
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen padsegmenten waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netstructuur
    attributes:
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      tussen:
        range: Padsegment
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Capaciteitsdeling tussen transporteenheden:
    class_uri: Capaciteitsdeling-tussen-transporteenheden
    broad_mappings:
      - begrip:dwk8c #transportcapaciteit
    description: relatie tussen transporteenheden waarbij hun transportcapaciteit bij gelijktijdig transport wordt begrensd door gedeelde netstructuur
    attributes:
      aanwezige transportcapaciteit:
        exact_mappings:
          - begrip:2whwi #aanwezige transportcapaciteit
        range: Reëel getal
        required: true
        unit:
          ucum_code: MW
      beschikbare transportcapaciteit:
        description: deel van de aanwezige transportcapaciteit dat niet wordt ingezet om aan de benodigde transportcapaciteit te voldoen
        source: bce:g=2026-04-25
        comments:
          - "Validatieregel: gelijk aan het verschil tussen de aanwezige transportcapaciteit en de som van de benodigde transportcapaciteiten van de betrokken transporteenheden."
        range: Reëel getal
        unit:
          ucum_code: MW
      # relaties:
      tussen:
        range: Transporteenheid
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - tussen
  Padsegment:
    class_uri: Padsegment
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: afzonderlijk relevante transportroute voor capaciteits- en faalscenario-analyse
    comments:
      - Bij elektriciteit beginnen en/of eindigen padsegmenten typisch bij een railsysteem. Het railsysteem wordt functioneel toegerekend aan alle inkomende en uitgaande padsegmenten die er gebruik van maken. Railkoppelingen worden niet als padsegmenten gezien, tenzij zij, in zeer uitzonderlijke gevallen, afzonderlijk relevante faalscenario's of capaciteitsbeperkingen introduceren.
      - In vermaasde netten zonder redundantie (zoals in sommige laagspanningsnetten) wijzen padsegmenten richting het balanspunt (het punt waar de stroomsterkte in de standaardbedieningssituatie in theorie nul is). Als een balanspunt zich in een verdeelkast bevindt, eindigen de betreffende padsegmenten bij die kast (als knooppunt). Als een verbinding tussen twee kasten het balanspunt vormt, dan zijn er twee padsegmenten die samenkomen in één knooppunt, waar eventuele huisaansluitingen topologisch op in kunnen prikken.
      - Een transportroute waarin netelementen parallel staan opgesteld maar niet onafhankelijk kunnen falen, wordt als één padsegment beschouwd. Dit geldt onder andere voor parallelle kabels tussen stations zonder schakelmogelijkheid en verbindingen tussen railsystemen met parallelle transformateren die bij falen niet kunnen worden geïsoleerd.
      - Stationsautomatisering kan ertoe leiden dat meerdere railsystemen functioneel als één geheel opereren. Indien deze automatisering maakt dat bepaalde routes geen afzonderlijk relevante faalscenario's vormen, dan worden zij samen als één padsegment beschouwd.
      - "Een netelement kan gelijktijdig deel uitmaken van meer dan één padsegment. Dit komt standaard voor bij railsystemen. Een meer complex voorbeeld is een opstelling met een driewegstransformator. Daarbij maakt de wikkeling aan de primaire zijde deel uit van twee padsegmenten."
      - "Padsegmenten die uitsluitend zijn bedoeld voor inzet bij calamiteiten, storingen of uitzonderlijke bedrijfsvoering vormen afzonderlijke transporteenheden met normatief nul aanwezige transportcapaciteit. De normatieve ontwerprichting van een calamiteitenpadsegment loopt van het gesloten veld naar het open veld in de standaardbedieningssituatie."
    slots:
      - identificatie
    attributes:
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      # relaties:
      samengesteld uit:
        range: Geleidend netelement
        required: true
        multivalued: true
        annotations:
          inverse_cardinality: "*"
      van:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
      naar:
        range: Knooppunt
        required: true
        multivalued: false
        annotations:
          inverse_cardinality: "*"
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Knooppunt:
    class_uri: Knooppunt
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: begin- of eindpunt van één of meer padsegmenten
    comments:
      - Netaansluitpunten en railsystemen die hun transportbelasting afnemen van hetzelfde padsegment, worden functioneel als één knooppunt beschouwd.
    slots:
      - identificatie
    attributes:
      # relaties:
      deel van:
        range: Sectiegroep
        required: false
        multivalued: false
        annotations:
          inverse_cardinality: 1..*
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Sectiegroep:
    class_uri: Sectiegroep
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: verzameling knooppunten die onderling door bediening met elkaar verbonden kunnen worden, waarbij die verbinding in standaardbediening niet actief is
    slots:
      - identificatie
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie
  Geleidend netelement:
    class_uri: Geleidend-netelement
    broad_mappings:
      - begrip:a4ejc #netfunctie
    description: elementaire functionaliteit op een bepaalde plek in het energienet dat tenminste de (potentiële) geleiding van een energiedrager omvat
    slots:
      - identificatie
    attributes:
      normale capaciteit:
        description: transportcapaciteit in de standaardbedieningssituatie
        comments:
          - "Afleidingsregel: gelijk aan de kleinste normale capaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
      noodcapaciteit:
        description: transportcapaciteit in alternatieve bedieningssituaties
        comments:
          - De noodcapaciteit is doorgaans hoger dan de normale capaciteit omdat aangenomen wordt dat alternatieve bedieningssituaties kort duren.
          - "Afleidingsregel: gelijk aan de kleinste noodcapaciteit van de geleidende netelementen waaruit het padsegment bestaat."
        required: true
        range: Reëel getal
        unit:
          ucum_code: MVA
    unique_keys:
      identificatie:
        unique_key_slots:
          - identificatie

  # verwijzingen naar externe entiteiten:
  Marktpartij:
    class_uri: marktpartijenregister:Marktpartij
    annotations:
      external_registry: Marktpartijenregister
  Overdrachtspunt:
    class_uri: aansluitingenregister:Overdrachtspunt
    annotations:
      external_registry: Aansluitingenregister

slots:
  identificatie:
    description: unieke aanduiding waarmee iets binnen een gegeven context ondubbelzinnig herkenbaar is
    range: Code
    required: true

enums:
  Netvlak:
    description: deel van het energienet waarvoor geldt dat de verbruikers aangesloten op dit deel van het net eenzelfde tarief in rekening krijgen
    source: bce:g=2026-04-25
    comments:
      - Netvlakken hoeven niet altijd overeen te komen met een fysisch spanningsniveau.
    permissible_values:
      EHS:
        description: extra hoogspanning
      HS:
        description: hoogspanning
      TS:
        description: tussenspanning
      Trafo HS+TS / MS:
        comments:
          - Dit netvlak hoort bij een transporteenheid die zich functioneel bevindt tussen een HS- of TS-transporteenheid en een MS-transporteenheid.
      MS:
        description: middenspanning
      Trafo MS/LS:
        comments:
          - Dit netvlak hoort bij een transporteenheid die zich functioneel bevindt tussen een MS-transporteenheid en een LS-transporteenheid.
      LS:
        description: laagspanning
  Richting:
    permissible_values:
      normatief:
        description: richting van energietransport die leidend is voor het ontwerp en de beoordeling van transportzekerheid
      tegengesteld:
        description: richting van energietransport tegengesteld aan de normatieve ontwerprichting
